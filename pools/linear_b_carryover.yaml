pool: linear_b_carryover
source_citation: 'Linear-B carryover values from the canonical Linear-A → Linear-B
  syllabogram identification (Ventris & Chadwick 1956). Per-anchor citations to Younger
  2020 (Linear A texts in phonetic transcription, online edition), Schoep 2002 (The
  Administration of Neopalatial Crete), Salgarella 2020 (Aegean Linear Script(s)),
  and Palmer 1995 ("ku-ro and ki-ro in Linear A"). The anchors are committed under
  hypotheses/curated/{anchor,v4_anchor}_*.yaml; this pool is a promotion of the same
  surfaces to a first-class substrate pool so the v8/v9/v10/v11 pipeline can score
  them under a Mycenaean-Greek external phoneme LM as a positive control (mg-4664).

  '
license: 'Cited fair-use of secondary sources for compilation of the Linear-B carryover
  values. Underlying inscriptions and the Ventris-Chadwick 1956 syllabogram identifications
  are in the public domain.

  '
