pool: greek_polluted_aquitanian
source_citation: 'DELIBERATELY POLLUTED test pool generated from aquitanian.yaml (mg-7ecb,
  harness v15 cross-language pollution test). Half real aquitanian entries, half synthetic
  conjecturals drawn from the char-bigram distribution of the external phoneme LM
  at harness/external_phoneme_models/mycenaean_greek.json. The aquitanian length distribution
  is preserved so length is not a confound; the phoneme distribution is the *source
  LM''s*, NOT aquitanian''s. Test artifact, NOT a substrate claim. Conjecturals tagged
  provenance: conjectural_greek so the rollup can compute the per-provenance breakdown
  of the right-tail leaderboard. Deterministic seed 0xfa0fd94c61e71b23 (sha256("greek_polluted_aquitanian:conjectural")[:16]).
  See pools/greek_polluted_aquitanian.README.md for the full sampling procedure and
  a prominent warning that this pool exists only to test the framework''s distribution-shape
  selectivity.

  '
license: 'Mixed: real entries inherit the underlying aquitanian pool''s license (cited
  fair-use of Trask 1997 and Gorrochategui 1984). Conjectural entries are synthetic
  data sampled from the mycenaean_greek.json char-bigram model (statistical derivative;
  underlying corpus license recorded in harness/external_phoneme_models/mycenaean_greek.json''s
  meta block) and are released under the same terms as the lineara repo.

  '
