pool: etruscan
source_citation: |
  Bonfante, G., & Bonfante, L. (2002). The Etruscan Language: An Introduction
    (revised ed.). Manchester / New York: Manchester University Press.
    [the canonical English-language reference grammar; chapters 4 (alphabet
     and phonology), 5 (morphology), and the glossary in the appendix
     covering well-attested vocabulary.]
  Pallottino, M. (1968). Testimonia Linguae Etruscae (TLE), 2nd ed. Florence:
    La Nuova Italia. [the standard inscription numbering used in citations
     below; e.g. "TLE 1" = Cippus Perusinus.]
  Etruscan Texts Project (ETP), University of Massachusetts Amherst.
    https://etp.classics.umass.edu  [searchable corpus of ~13,000 Etruscan
     inscriptions; used for attestation cross-checks and frequency.]
  Public-domain Etruscan inscriptions (1st millennium BCE to 1st c. CE).
    The originals are out of copyright; secondary-source citations cover
    Bonfante & Bonfante 2002 and Pallottino's TLE inscription numbers.
license: |
  Cited fair-use of the secondary sources (Bonfante & Bonfante 2002 and
  Pallottino's TLE) for compilation of root surface, phoneme, gloss, and
  attestation fields. Underlying inscriptions are in the public domain.
