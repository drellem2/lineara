    gloss: Knossos (Cretan palatial site)
    semantic_field: place
    attestations: [KNOSSOS, KNOSOS]
    region: pre_greek
    citation: Beekes 2010 vol. 2 s.v. Knossos; Furnée 1972 §122 (-ssos suffix).
