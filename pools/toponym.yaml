  #   - Kretschmer 1896 _Einleitung_ for older substrate-name proposals
  #     (used sparingly, treated as a third-tier source);
  #   - DERIVED FRAGMENT SURFACES for the diagnostic substrate suffixes
  #     and a handful of high-frequency toponym onsets. Per the brief
  #     (mg-c2af), full toponym surfaces are too long for typical
  #     Linear-A windows; the suffix family /-ssos/, /-nthos/, /-ttos/
  #     etc. is what actually maps onto short syllabogram windows in
  #     accountancy tablets. See pools/toponym.README.md for the
  #     fragmentation rule.
