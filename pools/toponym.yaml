pool: toponym
source_citation: |
  Beekes, R. S. P. (2010). Etymological Dictionary of Greek. Leiden: Brill.
    Vol. 2 appendix on the Pre-Greek substrate; especially §§3-7 on the
    diagnostic suffixes -ssos, -nthos, -ttos, -ndos, and the substrate
    consonant alternations. Beekes argues a substantial fraction of
    Greek toponyms in the Aegean basin reflect a non-Indo-European
    Pre-Greek substrate; the entries here are drawn from his appendix
    list together with the broader Furnée corpus.
  Furnée, E. J. (1972). Die wichtigsten konsonantischen Erscheinungen
    des Vorgriechischen. The Hague: Mouton.
    [the main 20th-century catalogue of Pre-Greek toponym variants,
     consonant alternations, and substrate-suffix typology.]
  Renfrew, C. (1998). "The Archaeology of Religion." In: The Ancient
    Mind, Cambridge UP, pp. 47-54. [discussion of the Aegean place-name
    layer pre-dating Mycenaean Greek; cited for the Crete-as-substrate
    framing.]
  All toponyms here are public-domain attested place names; transcribed
  forms reflect the standard Greek-via-Latinate transliteration used in
  the secondary sources, with the macron-vowel /y/ rendered as /u/
  (Beekes' practice for pre-Greek substrate forms).
license: |
  Cited fair-use of Beekes 2010 and Furnée 1972 for compilation of the
  toponym surface, phoneme array, gloss, and substrate-citation fields.
  The toponyms themselves are public-domain attested place names.
