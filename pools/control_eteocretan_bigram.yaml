pool: control_eteocretan_bigram
source_citation: 'Phonotactic control pool generated from eteocretan.yaml (mg-9f18
  / harness v18, bigram-preserving sampler). Each control entry shares the substrate
  entry''s length and is sampled from the substrate pool''s bigram phoneme distribution
  with Laplace alpha=0.1. Each phoneme is drawn conditional on the previous phoneme
  so the realized control surfaces inherit the substrate''s adjacent-phoneme structure
  (CV transitions, vowel hiatus rates, etc.), not just its marginal histogram. Deterministic
  seed: 0x3d1999ee910e7d3d (sha256("control_pool:eteocretan:bigram")[:16]). See pools/control_eteocretan_bigram.README.md
  for the matching algorithm and per-pool histograms.

  '
license: 'Synthetic data; no source-text content. Released under the same terms as
  the lineara repo.

