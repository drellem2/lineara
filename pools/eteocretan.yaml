pool: eteocretan
source_citation: "Duhoux, Y. (1982). L'Étéocrétois: les textes — la langue. Amsterdam:\n\
  \  J. C. Gieben. — the canonical scholarly edition of the Eteocretan\n  inscriptional\
  \ record (Praisos 1-7, Dreros 1-2, Psychro stone).\nWhittaker, H. (2017). 'Of linguistic\
  \ alterity in Crete: the Eteocretan\n  inscriptions.' Scripta Classica Israelica\
  \ 36: 7-31. — supplementary\n  Praisos area minor inscriptions whose language is\
  \ non-Greek.\nYounger, J. G. (2000-present). 'Linear A: text and inscriptions.'\n\
  \  https://people.ku.edu/~jyounger/LinearA/  — Eteocretan annex covering\n  iron-age\
  \ Cretan short inscriptions.\nUnderlying inscriptions are public domain (~7th-3rd\
  \ c. BCE Cretan\n  stone-cut and pottery texts). Manual transcription via\n  scripts/build_eteocretan_corpus.py.\n"
license: 'Cited fair-use of Duhoux 1982 and Whittaker 2017 for transcription

  conventions and scholarly editing. Underlying inscriptions PD.

  '
