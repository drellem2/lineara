classification_rule: |
  Per CHIC catalog convention (Olivier & Godart 1996, retained in Younger's web edition):
  - #001-#100: syllabographic (default).
  - #101-#299: ideogram / logogram (BOS=ox, OVIS=sheep, GRA=grain, OLI=olive, VIN=wine, ...).
  - #300-#399: ideogram (numerals + fractions).
  - AMBIGUOUS_OVERRIDES table in scripts/build_chic_signs.py records per-sign exceptions where O&G classification is debated. None applied at v1; rule is purely numeric-range.
  Classification will be reviewed in chic-v3 against substrate-framework distributional evidence.
