  Decorte, R. (2017). _The First 'European' Writing._
  Civitillo, M. (2016). _La scrittura geroglifica minoica sui sigilli._
  Ventris, M. & Chadwick, J. (1956). _Documents in Mycenaean Greek._ Cambridge.
