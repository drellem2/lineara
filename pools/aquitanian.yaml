pool: aquitanian
source_citation: |
  Trask, R. L. (1997). The History of Basque. London: Routledge.
    [especially chapters 3-4 on Basque phonology, the substrate question,
     and the inherited core vocabulary.]
  Gorrochategui, J. (1984). Estudio sobre la onomastica indigena de Aquitania.
    Vitoria-Gasteiz: UPV/EHU.
    [the standard catalogue of Aquitanian votive- and funerary-inscription
     onomastica.]
  Public-domain Aquitanian inscriptions, attested on Roman-era altars in
    Aquitania Tertia / Novempopulania (1st-3rd c. AD); originals are out of
    copyright.
license: |
  Cited fair-use of the secondary sources (Trask 1997 and Gorrochategui 1984)
  for compilation of root surface, phoneme, gloss, and attestation fields.
  The underlying inscriptions are in the public domain.
