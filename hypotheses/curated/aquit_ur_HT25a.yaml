description: >
  Aquitanian-substrate candidate. Tokens 7..8 of HT 25a (AB10 AB27) are tested
  as Aquitanian /ur/ "water". Picked because AB10 (Linear-B carryover value
  /u/) sits at the position a vowel should occupy, and AB27 (Linear-B value
  /re/) carries an /r/ onset.
