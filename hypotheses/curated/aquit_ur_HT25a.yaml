  gloss_hint: "water"
  citation: "Trask 1997, _The History of Basque_, p. 99 (Aquitanian /ur/ 'water', attested in funerary inscriptions urs-, ur-c-, etc.); Gorrochategui 1984, _Estudio sobre la onomástica indígena de Aquitania_, §22."
equation:
