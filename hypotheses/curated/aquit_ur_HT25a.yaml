notes: |
  Bucket: aquitanian_plausible (B1).
  Prior expectation: MIXED — score should fall somewhere between the
  carryover and random-scramble buckets. /u/ is V-class, /r/ is S-class.
  V->S transition = 0.40 (common Basque CV-then-coda pattern). AB27's actual
  position fingerprint matters most for the position term; if AB27 is
  medial-heavy it fits S-class (medial 0.55) well.
  HT 25a tokens 7..8 are AB10 AB27 in the word 'AB10 AB27 AB40' (an
  onomastic-looking three-sign word). The accountancy genre of HT 25a is
  *not* incompatible with a place-name beginning with /ur-/ (cf. Spanish
  toponyms Urgell, Urola).
