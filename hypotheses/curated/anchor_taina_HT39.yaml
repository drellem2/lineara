  citation: "Younger 2020 (online edition), corpus index s.v. AB59 AB28 AB123 sequences (4 attestations: HT 9a, HT 9b, HT 39, HT 123a); Salgarella 2020, _Aegean Linear Script(s)_, p. 145; Ventris-Chadwick 1956 values AB59=ta, AB28=i; AB123 reading conjectural."
