name: anchor_taina_HT39
description: >
  Linear-B carryover anchor. AB59-AB28-AB123 reads /ta-i-na/ under standard
  Ventris-Chadwick values for AB59 (ta) and AB28 (i), with AB123 conventionally
  read /na/ (Younger 2020 conjectured value). The three-sign string recurs
  at the head of administrative tablets HT 9a, HT 9b, HT 39, HT 123a — strong
  evidence of a fixed three-syllable lexeme; the canonical reading is a
  toponym / onomastic stem.
