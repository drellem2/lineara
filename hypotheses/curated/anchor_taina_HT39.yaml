notes: |
  Bucket: linear_b_carryover_anchor (A4).
  Prior expectation: HIGH score with control_z well above 0. With 3 phonemes
  the control distribution has 6 unique permutations, so the z signal is
  finer-grained than the 2-phoneme cases. Class bigram path #->C->V->S =
  0.55 * 0.85 * 0.40 (canonical CV...VS Basque-style word). AB123 has
  modest corpus attestation; we use the V-class fallback for /na/'s position
