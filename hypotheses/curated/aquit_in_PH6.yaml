description: >
  Aquitanian-substrate candidate. Tokens 0..1 of PH 6 (AB28 AB06) are tested
  as Aquitanian /in/ "in / inside" — postpositional locative attested in
  the Aquitanian funerary corpus (e.g. as a final element in deity names).
