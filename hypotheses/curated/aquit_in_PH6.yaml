notes: |
  Bucket: aquitanian_plausible (B4).
  Prior expectation: MIXED. /i/ is V-class, /n/ is S-class. V->S = 0.40.
  AB06 actual [.08,.43,.45,.04] is medial+final-balanced — close to the
  S-class profile [.20,.55,.20,.05] (BC fit moderate). AB28 (mostly initial)
  does not match V-class final preference cleanly.
  PH 6 is a four-token inscription on a vase ('AB28 AB06 AB54 / DIV'),
  exactly the kind of short two-word context where a locative postposition
  could plausibly land.
