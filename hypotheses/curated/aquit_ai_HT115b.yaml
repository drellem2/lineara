  gloss_hint: "slope / hillside (cf. Modern Basque aitz 'rocky outcrop')"
  citation: "Trask 1997, _The History of Basque_, p. 256 (substrate root *ai-); Hualde & de Urbina 2003, _A Grammar of Basque_, on the aitz / aizko derivational family."
