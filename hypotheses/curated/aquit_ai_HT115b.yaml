description: >
  Aquitanian-substrate candidate. Tokens 37..38 of HT 115b (AB08 AB28) are
  tested as Aquitanian /ai/ "slope / hillside" (Trask 1997 lists *ai- in
  several toponyms; Modern Basque retains aitz "rocky outcrop"). Both signs
  are well-attested syllabograms.
