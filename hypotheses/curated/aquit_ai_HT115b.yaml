notes: |
  Bucket: aquitanian_plausible (B2).
  Prior expectation: MIXED. /a/ and /i/ are both V-class, so the class
  bigram is V->V = 0.05 — RARE in Basque (hiatus is dispreferred). The
  position term will dominate; AB08 (81% initial) and AB28 (44% initial) are
  both initial-heavy, so neither fits the V-class final-friendly profile
  cleanly. Expectation: this scores LOW even though the root is real, because
  the class system collapses the two vowels and treats V->V as marked. A v0
  metric limitation; documented.
