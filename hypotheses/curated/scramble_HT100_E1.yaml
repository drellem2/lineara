notes: |
  Bucket: random_scramble_baseline (E1).
  Prior expectation: control_z near 0. Random IPA phonemes have no a-priori
  reason to align with corpus position fingerprints; permutations should
  give a control distribution roughly centered on the actual score, so z
  collapses. /q/ first-char → C-class; /ʁ/ first-char → C-class (uvular,
  treated as consonant). C->C = 0.05 (rare). Both phonemes the same class
  means permutations of THIS particular pair give identical scores, which
  forces z=0 (handled in metric: std=0 -> z=0 with metric_notes flag).
  This is the metric-degenerate case; treat the result as a sanity probe.
