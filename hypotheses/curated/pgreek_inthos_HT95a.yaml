    AB10: th
notes: |
  Bucket: pre_greek_toponym_plausible (D3).
  Prior expectation: MIXED. /n/ S-class, /th/ C-class. S->C = 0.40. AB76
  actual [.02,.21,.74,.02] is overwhelmingly final — moderate fit for S
  (which expects 20% final). AB10 is rarer in the corpus; its position
  fingerprint will dominate. Different signs from D1 (which uses AB31 AB02
  for /n-th/) so the two D-bucket /n-th/ candidates are independent
  observations of the same proposed phoneme-sequence under different
  positional contexts.
