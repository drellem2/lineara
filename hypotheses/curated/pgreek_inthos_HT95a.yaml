    - "th"
  gloss_hint: "/n-th/ — Pre-Greek -nthos toponym fragment (Korinthos, Zakynthos, Tiryns)"
  citation: "Beekes 2010, _Etymological Dictionary of Greek_, vol. 2 appendix s.v. -nthos; Furnée 1972 §§145-150."
equation:
  inscription_id: "HT 95a"
  span: [25, 26]
  sign_to_phoneme:
