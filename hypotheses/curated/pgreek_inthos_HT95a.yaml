description: >
  Pre-Greek toponym candidate. Tokens 25..26 of HT 95a (AB76 AB10) are
  tested as the nasal + dental fragment of an /-inthos/ ending, with proposed
  phonemes /n/ + /th/. The /-nthos/ suffix is the second-most-attested
  Pre-Greek toponym ending after -ssos.
author: pm-lineara
