schema_version: candidate_equation.v1
name: pgreek_korinth_HT17
description: >
  Pre-Greek toponym candidate. Tokens 10..11 of HT 17 (AB31 AB02) are
  proposed as a /-nth-/ stem fragment (as in Korinth-os, Olynth-os,
  Zakynth-os), where the proposed phoneme sequence is /n/ + /th/. The
  -nthos suffix is one of the two best-attested Pre-Greek substrate suffixes
  (Beekes 2010).
author: pm-lineara
created: 2026-05-04
source_pool: pre_greek_toponym
