  phonemes:
    - "s"
    - "o"
  gloss_hint: "/-s-o-/ in Pre-Greek toponym suffix -ssos / -sos (Knossos, Tylissos, Parnassos)"
  citation: "Beekes 2010, _Etymological Dictionary of Greek_, vol. 2 appendix on Pre-Greek -ssos toponym suffix; Furnée 1972, §§120-128."
equation:
  inscription_id: "HT 20"
  span: [1, 2]
  sign_to_phoneme:
    AB02: s
    AB58: o
notes: |
  Bucket: pre_greek_toponym_plausible (D2).
  Prior expectation: MIXED, leaning POSITIVE. /s/ C-class, /o/ V-class.
  C->V = 0.85 (the canonical Basque-style CV onset, also typical of Greek
  syllable structure). AB02 (78% final) is a poor fit for C-class
  (initial+medial preference). AB58 (medial-heavy) does not strongly fit
  V-class (final preference) either. Bigram term should dominate; expected
  to land in the middle of the score distribution.
