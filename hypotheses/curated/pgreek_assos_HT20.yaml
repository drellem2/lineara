description: >
  Pre-Greek toponym candidate. Tokens 1..2 of HT 20 (AB02 AB58) are proposed
  as a /-sos/ fragment from the Pre-Greek toponym suffix -ssos (Knossos,
  Tylissos, Parnassos), with phonemes /s/ + /o/.
author: pm-lineara
created: 2026-05-04
source_pool: pre_greek_toponym
root:
